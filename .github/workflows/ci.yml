name: Sheryan Backend CI Pipeline

#   يتم تشغيل هذه الأتمتة عند كل Push أو Pull Request على فرع main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # تشغيل خط الإنتاج على سيرفر لينكس سحابي 
    runs-on: ubuntu-latest

    services:
      # إعداد قاعدة بيانات Postgres مؤقتة للسيرفر السحابي ليتمكن التست من الاتصال بها
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sheryan_db
          POSTGRES_USER: sheryan_user
          POSTGRES_PASSWORD: sheryan_secure_pass
        ports:
          - 5432:5432
        # الانتظار حتى تتأكد جيتهاب أن قاعدة البيانات أصبحت جاهزة تماماً
        options: >-
          --health-cmd "pg_isready -U sheryan_user -d sheryan_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # الخطوة الأولى: جلب ملفات كود المشروع من مستودعك لداخل السيرفر السحابي
    - name: Checkout code
      uses: actions/checkout@v4

    # الخطوة الثانية: تهيئة بيئة بايثون 3.12 داخل السيرفر السحابي
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.12'

    # الخطوة الثالثة: تثبيت التبعيات والمكتبات من ملف requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # الخطوة الرابعة: تشغيل الاختبارات المؤتمتة الصارمة باستخدام Pytest 
    - name: Run Tests with Pytest
      env:
        # تمرير متغيرات البيئة المؤقتة لكي يعرف دجانقو كيف يتصل بقاعدة بيانات الفحص السحابية
        DJANGO_SETTINGS_MODULE: core.settings
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: sheryan_db
        DB_USER: sheryan_user
        DB_PASSWORD: sheryan_secure_pass
      run: |
        pytest